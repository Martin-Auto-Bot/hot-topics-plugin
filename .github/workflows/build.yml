name: Build & Release Plugin

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.version.outputs.changelog }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract plugin version
      id: version
      run: |
        VERSION=$(grep 'version =' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "插件版本: ${VERSION}"

        # 生成变更日志
        if git tag --list &>/dev/null; then
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "初始发布")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20 2>/dev/null || echo "初始发布")
          fi
        else
          CHANGELOG="初始发布"
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Build Plugin
      run: ./gradlew buildPlugin

    - name: Verify build output
      run: |
        echo "=== 构建产物 ==="
        ls -la build/distributions/
        echo ""
        echo "=== 插件 zip 内部结构 (确认可直接安装) ==="
        unzip -l build/distributions/hot-topics-plugin-*.zip

    # ── 每次 push 都更新 dev-latest pre-release，提供可直接安装的 zip ──
    - name: Publish dev-latest release
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: dev-latest
        name: "Hot Topics Plugin (开发版)"
        body: |
          ## 开发版构建

          > 本 Release 由每次 push 到 main 分支自动更新，包含最新代码变更。

          ### 安装方法
          1. 下载下方 `hot-topics-plugin-*.zip`（**直接下载，无需再解压**）
          2. 打开 IntelliJ IDEA / GoLand
          3. 进入 `Settings` → `Plugins` → ⚙️ → `Install Plugin from Disk...`
          4. 选择刚下载的 zip 文件，重启 IDE
          5. 在 IDE 右侧边栏找到 **Hot Topics** 面板
        files: build/distributions/*.zip
        prerelease: true
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── 正式发布：仅在推送 v* tag 时触发 ──
    - name: Publish official release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "Hot Topics Plugin v${{ steps.version.outputs.version }}"
        body: |
          ## Hot Topics Browser IntelliJ Plugin v${{ steps.version.outputs.version }}

          ### 安装方法
          1. 下载下方 `hot-topics-plugin-*.zip`（**直接下载，无需再解压**）
          2. 打开 IntelliJ IDEA / GoLand
          3. 进入 `Settings` → `Plugins` → ⚙️ → `Install Plugin from Disk...`
          4. 选择下载的 zip 文件，重启 IDE
          5. 在 IDE 右侧边栏找到 **Hot Topics** 面板

          ### 功能
          - 浏览 V2EX、知乎、微博等平台热门话题
          - V2EX 接入真实 API，实时获取最新热门话题
          - 话题列表浏览和详情查看
          - 一键在浏览器中打开原帖

          ### 更新日志
          ${{ steps.version.outputs.changelog }}
        files: build/distributions/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
