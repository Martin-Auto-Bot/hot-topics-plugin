name: Build & Release Plugin

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      plugin_zip: ${{ steps.version.outputs.plugin_zip }}
      changelog: ${{ steps.version.outputs.changelog }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract plugin version
      id: version
      run: |
        # 从 build.gradle.kts 中提取版本号
        VERSION=$(grep 'version =' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "plugin_zip=hot-topics-plugin-${VERSION}.zip" >> $GITHUB_OUTPUT
        echo "插件版本: ${VERSION}"

        # 生成变更日志（最近一次 tag 之后的提交）
        if git tag --list &>/dev/null; then
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "初始发布")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20 2>/dev/null || echo "初始发布")
          fi
        else
          CHANGELOG="初始发布"
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Build Plugin
      run: ./gradlew buildPlugin

    - name: Verify build output
      run: |
        echo "=== 构建产物 ==="
        ls -la build/distributions/
        PLUGIN_ZIP=$(ls build/distributions/hot-topics-plugin-*.zip | head -1)
        echo ""
        echo "=== 插件 zip 内部结构 ==="
        unzip -l "$PLUGIN_ZIP"

    # ── 制品上传：解压后再上传目录，避免 zip 套 zip ──
    - name: Prepare installable artifact
      run: |
        mkdir -p install-artifact
        cp build/distributions/hot-topics-plugin-*.zip install-artifact/
        echo "install-artifact 目录内容:"
        ls -la install-artifact/

    - name: Upload plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: hot-topics-plugin-${{ steps.version.outputs.version }}
        path: install-artifact/
        retention-days: 90
        if-no-files-found: error

  # ── 发布到 GitHub Release：仅在推送 tag (v*) 时触发 ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Plugin for Release
      run: ./gradlew buildPlugin

    # 直接使用 build/distributions 下的原始 zip（无 zip 套 zip 问题）
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Hot Topics Plugin v${{ needs.build.outputs.version }}
        body: |
          ## Hot Topics Browser IntelliJ Plugin v${{ needs.build.outputs.version }}

          ### 安装方法
          1. 下载下方 `hot-topics-plugin-*.zip` 文件
          2. 打开 IntelliJ IDEA / GoLand
          3. 进入 `Settings` → `Plugins` → ⚙️ → `Install Plugin from Disk...`
          4. 选择下载的 zip 文件，重启 IDE
          5. 在 IDE 右侧边栏找到 **Hot Topics** 面板

          ### 功能
          - 浏览 V2EX、知乎、微博等平台热门话题
          - V2EX 接入真实 API，实时获取最新热门话题
          - 话题列表浏览和详情查看
          - 一键在浏览器中打开原帖

          ### 更新日志
          ${{ needs.build.outputs.changelog }}
        files: build/distributions/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
